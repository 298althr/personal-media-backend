version: '3.8'
services:
  backend:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http backend:3000 --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTH_TOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - backend
